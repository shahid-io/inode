version: 2

project_name: inode

before:
  hooks:
    - go mod tidy

builds:
  - id: inode
    main: ./main.go
    binary: inode
    env:
      - CGO_ENABLED=1
      # Linux arm64 cross-compile uses the toolchain installed by the
      # release workflow (apt-get install gcc-aarch64-linux-gnu).
      - >-
        {{- if eq .Arch "arm64" -}} CC=aarch64-linux-gnu-gcc {{- end -}}
    # v0.2.x publishes Linux binaries only. macOS and Windows users:
    # `go install github.com/shahid-io/inode@latest`. CGO + sqlite-vec
    # cross-compile for those targets needs heavier infra (zig / osxcross
    # for darwin; mingw-w64 cross-tools for windows) than this hobby
    # project warrants today. Re-add when there's demand.
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/shahid-io/inode/internal/version.Version={{.Version}}
      - -X github.com/shahid-io/inode/internal/version.Commit={{.Commit}}
      - -X github.com/shahid-io/inode/internal/version.Date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance"
      regexp: "^perf"
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: shahid-io
    name: inode
  name_template: "v{{ .Version }}"
  footer: |
    ---
    **Full Changelog**: https://github.com/shahid-io/inode/blob/main/CHANGELOG.md
