version: 2

project_name: inode

before:
  hooks:
    - go mod tidy

builds:
  - id: inode
    main: ./main.go
    binary: inode
    env:
      - CGO_ENABLED=1
    # v0.2.x publishes Linux amd64 only. Other targets (macOS, Windows,
    # Linux arm64) need cross-compilation infra (mingw-w64, osxcross/zig,
    # gcc-aarch64-linux-gnu with goreleaser per-arch env) that's heavier
    # than a solo hobby project warrants right now. Affected users:
    # `go install github.com/shahid-io/inode@latest`. Re-add archs/OSes
    # as people actually ask for them.
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/shahid-io/inode/internal/version.Version={{.Version}}
      - -X github.com/shahid-io/inode/internal/version.Commit={{.Commit}}
      - -X github.com/shahid-io/inode/internal/version.Date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Performance"
      regexp: "^perf"
      order: 2
    - title: "Other"
      order: 999

release:
  github:
    owner: shahid-io
    name: inode
  name_template: "v{{ .Version }}"
  footer: |
    ---
    **Full Changelog**: https://github.com/shahid-io/inode/blob/main/CHANGELOG.md
