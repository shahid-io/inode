name: Release

# Triggered by tag push (`git push origin vX.Y.Z`) or manually from the
# Actions UI. Manual dispatch is useful for re-running after a fix
# without having to delete and re-push tags.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.2.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # When run via workflow_dispatch, check out the supplied tag.
          # On push: tags, github.ref already points at the tag.
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install GCC (Linux arm64 cross-compiler)
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CGO_ENABLED: 1
