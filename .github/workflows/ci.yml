name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install C compiler (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gcc

      # Windows runners ship with MinGW but no sqlite3 headers, and the
      # default PowerShell context can't resolve POSIX paths like
      # /mingw64/include when CGO calls gcc. We install the matched
      # mingw-w64 toolchain via MSYS2 and run the Go build *through*
      # msys2 {0} so gcc sees its own POSIX filesystem and finds the
      # headers under /mingw64/include automatically.
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-pkg-config

      - name: Download dependencies
        run: go mod download

      # Two Build / Test pairs — same go commands, different shell. On
      # Windows the msys2 shell makes gcc's default include path
      # (/mingw64/include) just work without any CGO_CFLAGS plumbing.

      - name: Build
        if: matrix.os != 'windows-latest'
        env:
          CGO_ENABLED: 1
        run: go build ./...

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
        run: go build ./...

      - name: Test
        if: matrix.os != 'windows-latest'
        env:
          CGO_ENABLED: 1
        run: go test -race -coverprofile=coverage.out ./...

      - name: Test (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        env:
          CGO_ENABLED: 1
        run: go test -race ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
