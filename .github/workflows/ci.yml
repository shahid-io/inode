name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install C compiler (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gcc

      # Windows runners ship with MinGW but no sqlite3 headers. MSYS2 supplies
      # both gcc (matched to its sqlite3 build) and the headers/libs the
      # sqlite-vec CGO bindings need to compile against. path-type:inherit
      # makes the MSYS2 binaries available to Go's toolchain when it shells
      # out to gcc from PowerShell — no `shell: msys2 {0}` per step.
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-pkg-config

      - name: Configure CGO (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          echo "CGO_CFLAGS=-I/mingw64/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L/mingw64/lib" >> $GITHUB_ENV

      - name: Download dependencies
        run: go mod download

      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build ./...

      - name: Test
        env:
          CGO_ENABLED: 1
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
